name: psx_vision_pro
description: Pakistan's most advanced stock market intelligence tracking application.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5

  # State Management & Dependency Injection
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Firebase Suite for Cloud Auth & Realtime Storage
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.3
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.10
  firebase_analytics: ^10.7.4
  firebase_crashlytics: ^3.4.9
  firebase_remote_config: ^4.3.8

  # SQLite Database & Secure Credentials Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  path: ^1.9.0

  # Networking & Real-Time Streams
  http: ^1.1.2
  web_socket_channel: ^2.4.1
  connectivity_plus: ^5.0.2

  # UI Enhancement, Charts, & Helper Utils
  fl_chart: ^0.66.0
  intl: ^0.19.0
  shimmer: ^3.0.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lang/en.json
    - assets/lang/ur.json
